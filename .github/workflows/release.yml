name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: bibtui
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────────
  # Re-run tests on the tagged commit before building.

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

  # ── Build ─────────────────────────────────────────────────────────────────────
  # Produces stripped release binaries for all platforms via a matrix.
  # macOS builds (both architectures) run on the same macos-latest (Apple
  # Silicon) runner using cross-compilation for Intel.
  # Windows uses the native MSVC toolchain on a windows-latest runner.

  build:
    name: Build — ${{ matrix.platform }}
    needs: test
    runs-on: ${{ matrix.os }}
    # macOS builds are best-effort: runner availability and SDK changes can
    # cause transient failures.  continue-on-error prevents them from blocking
    # the release of Linux and Windows binaries.
    continue-on-error: ${{ startsWith(matrix.platform, 'macos') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: bibtui
            archive: tar

          - platform: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: bibtui
            archive: tar

          - platform: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: bibtui
            archive: tar

          - platform: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: bibtui.exe
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: >
          tar -czf ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: >
          Compress-Archive
          -Path target/${{ matrix.target }}/release/${{ matrix.binary }}
          -DestinationPath ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}
          path: ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}.*
          if-no-files-found: error

  # ── RPM ───────────────────────────────────────────────────────────────────────
  # Builds an RPM package for Fedora / RHEL / openSUSE using cargo-generate-rpm.

  rpm:
    name: RPM Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: rpm

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/bibtui

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Generate RPM
        run: cargo generate-rpm

      - name: Rename RPM
        run: |
          RPM=$(ls target/generate-rpm/*.rpm | head -1)
          cp "$RPM" ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-linux-x86_64.rpm

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-linux-x86_64-rpm
          path: ${{ env.PACKAGE_NAME }}-${{ github.ref_name }}-linux-x86_64.rpm
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────────
  # Downloads all build artifacts, then creates a GitHub release with them
  # attached.

  release:
    name: Release
    needs: [build, rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          cat > notes.md << EOF
          ## bibtui ${TAG}

          A terminal UI BibTeX manager.

          ### Downloads

          | Platform               | Archive                                          |
          |------------------------|--------------------------------------------------|
          | Linux x86-64 (static)  | \`bibtui-${TAG}-linux-x86_64.tar.gz\`            |
          | Linux x86-64 (RPM)     | \`bibtui-${TAG}-linux-x86_64.rpm\`               |
          | macOS Apple Silicon    | \`bibtui-${TAG}-macos-aarch64.tar.gz\`           |
          | macOS Intel            | \`bibtui-${TAG}-macos-x86_64.tar.gz\`            |
          | Windows x86-64         | \`bibtui-${TAG}-windows-x86_64.zip\`             |

          **Linux / macOS** — extract and place on your \`\$PATH\`:
          \`\`\`
          tar -xzf bibtui-<platform>.tar.gz
          mv bibtui ~/.local/bin/
          \`\`\`

          **Linux (RPM)** — install with your package manager:
          \`\`\`
          sudo rpm -i bibtui-<version>-linux-x86_64.rpm
          \`\`\`

          **Windows** — extract \`bibtui.exe\` from the zip and place it in a directory on your \`%PATH%\`.
          EOF

          if [ -n "${PREV_TAG}" ]; then
            echo "" >> notes.md
            echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}" >> notes.md
          fi

          gh release create "${TAG}" \
            --repo "${REPO}" \
            --title "${TAG}" \
            --notes-file notes.md \
            artifacts/*
