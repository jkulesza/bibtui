stages:
  - test
  - build
  - package
  - release

variables:
  PACKAGE_NAME: bibtui
  # Store cargo registry inside the project dir so it can be cached
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

# ── Test ──────────────────────────────────────────────────────────────────────
# Runs on every push and merge-request pipeline.

test:
  stage: test
  image: rust:latest
  cache:
    key: "test-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  script:
    - cargo test --verbose

# ── Build ─────────────────────────────────────────────────────────────────────
# Runs only on tag pushes. Produces stripped release binaries.

build:linux-x86_64:
  stage: build
  image: rust:latest
  cache:
    key: "build-linux-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  before_script:
    - apt-get update -qq && apt-get install -y musl-tools
    - rustup target add x86_64-unknown-linux-musl
  script:
    - cargo build --release --target x86_64-unknown-linux-musl
    - strip target/x86_64-unknown-linux-musl/release/${PACKAGE_NAME}
  artifacts:
    paths:
      - target/x86_64-unknown-linux-musl/release/${PACKAGE_NAME}
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# Windows cross-compilation uses MinGW-w64 from the Debian package repos —
# no Windows runner required. Produces a native x86-64 .exe.
build:windows-x86_64:
  stage: build
  image: rust:latest
  cache:
    key: "build-windows-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  before_script:
    - apt-get update -qq && apt-get install -y mingw-w64
    - rustup target add x86_64-pc-windows-gnu
  script:
    - cargo build --release --target x86_64-pc-windows-gnu
      --config target.x86_64-pc-windows-gnu.linker=\"x86_64-w64-mingw32-gcc\"
    - x86_64-w64-mingw32-strip target/x86_64-pc-windows-gnu/release/${PACKAGE_NAME}.exe
  artifacts:
    paths:
      - target/x86_64-pc-windows-gnu/release/${PACKAGE_NAME}.exe
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# macOS builds require a GitLab SaaS macOS runner (Premium/Ultimate plan).
# Both Intel and Apple Silicon binaries are produced from the same M1 runner
# job using Rust's built-in cross-compilation support.
build:macos:
  stage: build
  tags:
    - saas-macos-medium-m1
  variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  cache:
    key: "build-macos-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "${HOME}/.cargo/env"
    - rustup target add aarch64-apple-darwin x86_64-apple-darwin
  script:
    - source "${HOME}/.cargo/env"
    - cargo build --release --target aarch64-apple-darwin
    - cargo build --release --target x86_64-apple-darwin
    - strip target/aarch64-apple-darwin/release/${PACKAGE_NAME}
    - strip target/x86_64-apple-darwin/release/${PACKAGE_NAME}
  artifacts:
    paths:
      - target/aarch64-apple-darwin/release/${PACKAGE_NAME}
      - target/x86_64-apple-darwin/release/${PACKAGE_NAME}
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# ── Package ───────────────────────────────────────────────────────────────────
# Creates tarballs and uploads them to the GitLab generic package registry
# so they persist beyond the job artifact expiry and can be linked from releases.

package:
  stage: package
  image: alpine:latest
  needs:
    - build:linux-x86_64
    - build:windows-x86_64
    - build:macos
  before_script:
    - apk add --no-cache curl zip
  script:
    - >
      tar -czf ${PACKAGE_NAME}-linux-x86_64.tar.gz
      -C target/x86_64-unknown-linux-musl/release ${PACKAGE_NAME}
    - >
      tar -czf ${PACKAGE_NAME}-macos-aarch64.tar.gz
      -C target/aarch64-apple-darwin/release ${PACKAGE_NAME}
    - >
      tar -czf ${PACKAGE_NAME}-macos-x86_64.tar.gz
      -C target/x86_64-apple-darwin/release ${PACKAGE_NAME}
    - >
      zip -j ${PACKAGE_NAME}-windows-x86_64.zip
      target/x86_64-pc-windows-gnu/release/${PACKAGE_NAME}.exe
    - |
      for archive in \
          "${PACKAGE_NAME}-linux-x86_64.tar.gz" \
          "${PACKAGE_NAME}-macos-aarch64.tar.gz" \
          "${PACKAGE_NAME}-macos-x86_64.tar.gz" \
          "${PACKAGE_NAME}-windows-x86_64.zip"; do
        curl --fail --silent --show-error \
             --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "${archive}" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${archive}"
      done
  rules:
    - if: $CI_COMMIT_TAG

# ── Release ───────────────────────────────────────────────────────────────────
# Creates a GitLab release with download links into the package registry.
# Triggered automatically when a tag is pushed (e.g. git tag v0.2.0 && git push --tags).

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - package
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    name: "${CI_COMMIT_TAG}"
    tag_name: "${CI_COMMIT_TAG}"
    description: |
      ## bibtui ${CI_COMMIT_TAG}

      A terminal UI BibTeX manager.

      ### Downloads

      | Platform               | Archive                            |
      |------------------------|------------------------------------|
      | Linux x86-64 (static)  | `bibtui-linux-x86_64.tar.gz`       |
      | macOS Apple Silicon    | `bibtui-macos-aarch64.tar.gz`      |
      | macOS Intel            | `bibtui-macos-x86_64.tar.gz`       |
      | Windows x86-64         | `bibtui-windows-x86_64.zip`        |

      **Linux / macOS** — extract and place on your `$PATH`:
      ```
      tar -xzf bibtui-<platform>.tar.gz
      mv bibtui ~/.local/bin/
      ```

      **Windows** — extract `bibtui.exe` from the zip and place it in a directory on your `%PATH%`.
    assets:
      links:
        - name: "bibtui-linux-x86_64.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/bibtui-linux-x86_64.tar.gz"
          link_type: package
        - name: "bibtui-macos-aarch64.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/bibtui-macos-aarch64.tar.gz"
          link_type: package
        - name: "bibtui-macos-x86_64.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/bibtui-macos-x86_64.tar.gz"
          link_type: package
        - name: "bibtui-windows-x86_64.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/bibtui-windows-x86_64.zip"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
